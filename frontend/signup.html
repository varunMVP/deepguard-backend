<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepGuard — Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }
        .auth-bg {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .auth-glow {
            position: absolute;
            width: 400px; height: 400px;
            background: rgba(0,245,196,0.06);
            border-radius: 50%;
            filter: blur(100px);
            top: -100px; left: -100px;
        }
        .auth-card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            z-index: 1;
        }
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .auth-logo-text {
            font-family: var(--font-mono);
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 2px;
        }
        .auth-logo-text span { color: var(--accent); }
        .auth-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .auth-sub {
            font-size: 0.85rem;
            color: var(--muted);
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-form { display: flex; flex-direction: column; gap: 1rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .form-label {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            letter-spacing: 1px;
            color: var(--muted);
            text-transform: uppercase;
        }
        .form-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.75rem 1rem;
            color: var(--text);
            font-family: var(--font-display);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }
        .form-input:focus { border-color: var(--accent); }
        .form-input::placeholder { color: var(--muted); }
        .auth-btn {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 6px;
            padding: 0.85rem;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
            width: 100%;
        }
        .auth-btn:hover { background: #00dbb0; transform: translateY(-1px); }
        .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1rem 0;
        }
        .divider-line { flex: 1; height: 1px; background: var(--border); }
        .divider-text {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 1px;
        }
        .github-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: transparent;
            border: 1px solid var(--border2);
            border-radius: 6px;
            padding: 0.75rem;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            letter-spacing: 0.5px;
        }
        .github-btn:hover { border-color: var(--accent); color: var(--accent); }
        .auth-link {
            text-align: center;
            font-size: 0.82rem;
            color: var(--muted);
            margin-top: 1.5rem;
        }
        .auth-link a {
            color: var(--accent);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.78rem;
        }
        .auth-link a:hover { text-decoration: underline; }
        .error-msg {
            background: rgba(244,63,94,0.1);
            border: 1px solid rgba(244,63,94,0.3);
            border-radius: 6px;
            padding: 0.75rem;
            font-size: 0.82rem;
            color: var(--danger);
            display: none;
            text-align: center;
        }
        .success-msg {
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.3);
            border-radius: 6px;
            padding: 0.75rem;
            font-size: 0.82rem;
            color: var(--success);
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="auth-page">
    <div class="auth-bg"></div>
    <div class="auth-glow"></div>

    <div class="auth-card">
        <div class="auth-logo">
            <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
                <polygon points="16,2 30,10 30,22 16,30 2,22 2,10" fill="none" stroke="#00f5c4" stroke-width="1.5"/>
                <polygon points="16,7 25,12 25,20 16,25 7,20 7,12" fill="none" stroke="#00f5c4" stroke-width="1" opacity="0.5"/>
                <circle cx="16" cy="16" r="3" fill="#00f5c4"/>
            </svg>
            <span class="auth-logo-text">DEEP<span>GUARD</span></span>
        </div>

        <h1 class="auth-title">Create Account</h1>
        <p class="auth-sub">Join DeepGuard AI authentication system</p>

        <div class="error-msg"   id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <div class="auth-form">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" id="fullName" class="form-input" placeholder="Your name">
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-input" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Min 6 characters">
            </div>
            <button class="auth-btn" id="signupBtn" onclick="handleSignup()">
                Create Account
            </button>
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">OR</span>
            <div class="divider-line"></div>
        </div>

        <button class="github-btn" onclick="handleGitHub()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
            </svg>
            Continue with GitHub
        </button>

        <div class="auth-link">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>
</div>

<script src="auth.js"></script>
<script>
    redirectIfLoggedIn();

    async function handleSignup() {
        const fullName = document.getElementById('fullName').value.trim();
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn      = document.getElementById('signupBtn');
        const errorEl  = document.getElementById('errorMsg');
        const successEl= document.getElementById('successMsg');

        if (!fullName || !email || !password) {
            showError('Please fill in all fields');
            return;
        }
        if (password.length < 6) {
            showError('Password must be at least 6 characters');
            return;
        }

        btn.disabled    = true;
        btn.textContent = 'Creating account...';
        errorEl.style.display   = 'none';
        successEl.style.display = 'none';

        try {
            await signUp(email, password, fullName);
            successEl.textContent   = '✅ Account created! Redirecting...';
            successEl.style.display = 'block';
            setTimeout(() => window.location.href = 'index.html', 1500);
        } catch (err) {
            showError(err.message || 'Signup failed. Please try again.');
            btn.disabled    = false;
            btn.textContent = 'Create Account';
        }
    }

    async function handleGitHub() {
        try {
            await signInWithGitHub();
        } catch (err) {
            showError(err.message || 'GitHub login failed');
        }
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent   = msg;
        el.style.display = 'block';
    }
</script>
</body>
</html>
